<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ChatGPT翻訳</title>
    <link rel="stylesheet" href="./taskpane.css" />
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <script src="./taskpane.js" defer></script>
  </head>
  <body>
    <main class="app-shell">
      <header class="header">
        <p class="eyebrow">Outlook Translation Add-in</p>
        <h1>ChatGPT翻訳</h1>
        <p class="lead">開いているOutlookメールを翻訳します</p>
      </header>

      <section class="panel" aria-label="翻訳設定">
        <div class="field">
          <label for="targetLanguage">翻訳先</label>
          <select id="targetLanguage">
            <option value="ja">日本語</option>
            <option value="en">英語</option>
            <option value="zh-CN">中国語・簡体字</option>
          </select>
        </div>

        <div class="field">
          <label for="mode">翻訳モード</label>
          <select id="mode">
            <option value="literal">意味を変えない直訳</option>
            <option value="business">自然なビジネス文</option>
            <option value="trade">貿易・輸出入向け</option>
          </select>
        </div>

        <div class="actions">
          <button id="loadEmailButton" type="button">メール本文を取得</button>
          <button id="translateButton" type="button" disabled>翻訳する</button>
          <button id="copyButton" type="button" disabled>コピー</button>
        </div>
      </section>

      <section id="errorArea" class="message error" aria-live="polite" hidden></section>
      <section id="statusArea" class="message status" aria-live="polite">Outlook環境を確認しています。</section>

      <section class="panel text-panel" aria-label="取得したメール本文">
        <label for="sourceText">取得したメール本文</label>
        <textarea id="sourceText" readonly placeholder="メール本文を取得するとここに表示されます。"></textarea>
      </section>

      <section class="panel result-panel" aria-label="翻訳結果">
        <div class="section-heading">
          <h2>翻訳結果</h2>
          <span id="resultMeta"></span>
        </div>
        <pre id="resultArea" tabindex="0">翻訳結果はここに表示されます。</pre>
      </section>
    </main>
  </body>
</html>
